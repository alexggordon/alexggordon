theme: 
   - github.com/nodejh/hugo-theme-mini
baseURL: https://alexggordon.com
languageCode: en-us
title: Alex Gordon

# languages:
#   en:
#     params:
#       archive:
#         other: Blog

# Default content language, support en (English) / zh (Chinese) / nl (Dutch) / fr (French) / es (Spanish) / da (Danish), default 'en'
defaultContentLanguage: en

hasCJKLanguage: true
permalinks:
  posts: /posts/:title/

paginate: 3

# Hugo Configure Markup
# More info: https://gohugo.io/getting-started/configuration-markup#
markup:
  highlight:
    guessSyntax: true
    style: emacs
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
  # needed to render raw HTML (e.g. <sub>, <sup>, <kbd>, <mark>)
  goldmark:
    renderer:
      unsafe: true

# Site parameters
params:
  # Site Author
  author: Alex Gordon
  # Author biography
  bio: <p>Software. DIY. Wine.</p><p>Boston</p>
  # Site Description, used in HTML meat
  description: Alex Gordon
  # Social links in footer
  social:
    hn: https://news.ycombinator.com/user?id=alexggordon
    github: https://github.com/alexggordon
    stackoverflow: https://stackoverflow.com/users/2506667/alexggordon
    linkedin: https://www.linkedin.com/in/alexggordon


  ###########################################
  # Optional Configuration
  ###########################################

  # To enable RSS, you could set `enableRSS: true`, default is `true`
  enableRSS: false
  # To enable comments, you may need to set `disqusShortname`
  enableComments: true
  # To enable comments, you may need to set `googleAnalytics`
  enableGoogleAnalytics: true
  # To enable table of content, you could set `showToc: true`, default is `false`
  showToc: true
  # To hidden powerBy message in the page footer, you could set: `showPowerBy: false`, default is `true`
  showPowerBy: false
  # To enable math typesetting , you could set `math: true`, default is `false`
  math: false
  # To hidden post summary in home page, you could set `hiddenPostSummaryInHomePage: true`, default is `false`
  hiddenPostSummaryInHomePage: false
  # Website copy write, default: '© Copyright 2021 ❤️ {params.author}'
  copyright: '' 

  # Extra links in navigation
  links:
    ## e.g.
    - name: Vintages
      path: /vintages

  # You can put your custom css and js to `static` directory, or use remote css and js files which start with `http://` or `https://`
  customCSS:
    - css/custom.css
  customJS:
    - https://cdn.jsdelivr.net/npm/embla-carousel@8.6.0/embla-carousel.umd.js
    - js/custom.js

module:
  mounts:
    - source: content
      target: content
    - source: layouts
      target: layouts
    - source: static
      target: static
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: data
      target: data
    - source: static/svgs/
      target: layouts/partials/svgs/
